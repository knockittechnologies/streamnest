# --- Step 1 (initial deploy): plain HTTP reverse proxy ---
# Once your domain points at the EC2 instance and certbot has issued a
# certificate (see EC2 setup steps in README), replace this file's contents
# with the HTTPS version further down and reload nginx.

server {
    listen 80;
    server_name _;   # replace with your domain, e.g. streamnest.example.com

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

