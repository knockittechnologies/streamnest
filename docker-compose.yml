version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-streamnest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-streamnest}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-streamnest}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Not exposed to the host on purpose — only the app container talks to it.

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-streamnest}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-streamnest}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    # No migration history exists for this project (we went straight to Docker),
    # so `db push` syncs schema.prisma -> the database directly on every boot.
    # This is fine for a single-admin app at this stage; once the schema
    # stabilizes, switch to `prisma migrate dev` locally + `migrate deploy`
    # here for proper, reviewable migration history.
    command: sh -c "npx prisma db push --skip-generate && node server.js"
    expose:
      - "3000"
      
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro

volumes:
  db_data:
  certbot_www:
  certbot_conf:
